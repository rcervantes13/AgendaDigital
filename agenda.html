<!DOCTYPE html>
<html lang="es" >
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Agenda Claudia Cervantes</title>
	<!--link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"-->
	<link rel="manifest" href="manifest.json">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

	<style type="text/css">
		*{
			margin: 0;
			padding: 0;
		}

		body {
			/* Fuente principal con respaldo de sans-serif del sistema */
			font-family: Roboto, 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
		}

		.calendar--app{
			max-width: 850px;
    		margin: auto;
    		overflow: hidden;
    		user-select: none;
		}

		.calendar--head{
			height: 60px;
			display: flex;
			align-items: center;
		}

		.calendar--head .head--title{
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 6px 14px;
			width: 100%;
			font-weight: bold;
		}

		.calendar--week{
			display: flex;
			margin: 0px 6px;
		}

		.calendar--week .day-content{
			font-weight: bold;
			font-size: 22px;
			overflow: hidden;
			text-align: center;
			height: 32px;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.calendar--content{
			margin: 0px 6px;
		}

		.calendar--content .week-days--content{
			width: 100%;
			display: flex;
		}

		.calendar--content .week-days--content .week-day{
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 22px;
			position: relative;
		}

		.btn--base{
			font-size: 28px;
			width: 50px;
			height: 50px;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
		}

		.today{
			border-radius: 50px;
		}


	</style>
</head>
<body>

	<!--div class="client-info" >
		Claudia Cervantes Agenda
	</div-->

	<div class="calendar--app" >
		<div class="calendar--head" >
			<div class="head--title"></div>
		</div>
		<div class="calendar--content-area" >
			<div class="calendar--week" >
				
			</div>
			<div class="calendar--content" ></div>
		</div>
	</div>

	<script type="text/javascript">

		const ci = {
			primary: "#2ecc71",
			primarycolor: "#ffffff",
			primarycolorbold: "#ffffff",
			primarycolorligth: "#ffffff",
			base: "#ffffff",
			basecolor: "#3f3f3f",
			basecolorbold: "#aaaaaa",
			basecolorligth: "#afafb5"
		}

		const icons = {
			arrow: ` <svg> <glyph glyph-name="uniE951" unicode="&#xe951;" d="M663 425l36 36l-289 289l-73 -72l217 -217l-217 -217l73 -73l253 254v0z" /> </svg>`
		}

		const today = new Date()
		const week_days = [
			["Domingo", "Dom"], 
			["Lunes", "Lun"], 
			["Martes", "Mar"], 
			["Miércoles", "Mié"], 
			["Jueves", "Jue"],
			["Viernes", "Vie"], 
			["Sábado", "Sab"]
		]

		const months = [
			"Enero", 
			"Febrero", 
			"Marzo", 
			"Abril", 
			"Mayo", 
			"Junio", 
			"Julio", 
			"Agosto", 
			"Septiembre", 
			"Octubre", 
			"Noviembre", 
			"Diciembre"
		]

		const core = {
			splitArray: (array, size) => {
				const result = []
				for (let i = 0; i < array.length; i += size) {
			        result.push(array.slice(i, i + size))
			    }
			    return result
			}
		}

		const calendar = { 
			els: {
				app: document.querySelector(".calendar--app"),
				head: document.querySelector(".calendar--head"),
				week: document.querySelector(".calendar--week"),
				content: document.querySelector(".calendar--content")
			},
			today: today.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-'),
			currentDate: {
				year: today.getFullYear(),
				month: today.getMonth(),
				day: 0
			},
			getCalendarDays: (year, month) => {
				const days = []
				
				// 1. Primer día del mes (ej: Martes)
				const firstDayOfMonth = new Date(year, month, 1)
				
				// 2. Último día del mes (ej: 30 de Abril)
				const lastDayOfMonth = new Date(year, month + 1, 0)

				// 3. Determinar cuántos días del mes anterior mostrar
				// Si el mes empieza en Martes (índice 2), necesitamos 2 días del mes anterior (Dom, Lun)
				const daysFromPrevMonth = firstDayOfMonth.getDay()

				// 4. Agregar días del mes anterior
				for (let i = daysFromPrevMonth; i > 0; i--) {
					const d = new Date(year, month, 1 - i)
					days.push({
						date: d,
						date_str: d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-'),
						day: d.getDate(),
						year: d.getFullYear(),
						month: d.getMonth(),
						currentMonth: false
					});
				}

				// 5. Agregar días del mes actual
				for (let i = 1; i <= lastDayOfMonth.getDate(); i++) {
					days.push({
						date: new Date(year, month, i),
						date_str: new Date(year, month, i).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-'),
						day: i,
						year: year,
						month: month,
						currentMonth: true
					});
				}

				// 6. Agregar días del mes siguiente para completar la última semana
				// Queremos llegar hasta el Sábado (índice 6)
				const remainingDays = 7 - (days.length % 7)
				if (remainingDays < 7) {
					for (let i = 1; i <= remainingDays; i++) {
						const d = new Date(year, month + 1, i)
						days.push({
							date: d,
							date_str: d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '-'),
							day: d.getDate(),
							year: d.getFullYear(),
							month: d.getMonth(),
							currentMonth: false
						});
					}
				}

				return days
			}
		}

		const calendar_app = document.querySelector(".calendar--app")

		const app = {
			load: () => {
				Gui.drawCalendar()
			}
		}

		const Gui = {
			goCurrentMonth: () => {
				let d = new Date()
				calendar.currentDate.year = d.getFullYear()
				calendar.currentDate.month = d.getMonth()
				Gui.drawCalendar()
			},
			nextMonth: () => {
				// Creamos una fecha con el año y mes actual (día 1 para evitar problemas con meses cortos)
				let d = new Date(calendar.currentDate.year, calendar.currentDate.month)

				// Sumamos un mes
				d.setMonth(d.getMonth() + 1)

				// Actualizamos tus variables con los nuevos valores automáticos
				calendar.currentDate.year = d.getFullYear()
				calendar.currentDate.month = d.getMonth()
				Gui.drawCalendar()
			},
			previousMonth: () => {
				// Creamos una fecha con el año y mes actual
				let d = new Date(calendar.currentDate.year, calendar.currentDate.month)

				// Restamos un mes
				d.setMonth(d.getMonth() - 1)

				// Actualizamos tus variables
				calendar.currentDate.year = d.getFullYear()
				calendar.currentDate.month = d.getMonth()
				Gui.drawCalendar()

			},
			drawCalendar: () => {
				calendar_app.style.borderRadius = window.innerWidth < 850 ? null : "8px"
				calendar_app.style.border = window.innerWidth < 850 ? null : "1px solid " + ci.basecolorligth

				const calendar_title = calendar.els.head.querySelector(".head--title")
				calendar.els.head.style.backgroundColor = ci.primary
				calendar.els.head.style.color = ci.primarycolor

				calendar_title.innerHTML = `
					<div style="display: flex; font-size: 24px;" >
						<div style="margin-right: 12px;" >${ months[calendar.currentDate.month] }</div>
						<div>${ calendar.currentDate.year }</div>
					</div>
					<div style="display: flex; align-items: center; justify-content: center;" >
						<span onclick="Gui.goCurrentMonth()" class="material-symbols-outlined btn--base" >today</span>
						<span onclick="Gui.previousMonth()" class="material-symbols-outlined btn--base" >chevron_left</span>
						<span onclick="Gui.nextMonth()" class="material-symbols-outlined btn--base" >chevron_right</span>
					</div>
				`

				Gui.drawWeekDays()
				Gui.drawDays()
			},
			drawWeekDays: () => {
				const calendar_week = calendar.els.week
				calendar_week.innerHTML = ""
				calendar_week.style.borderBottom = "1px solid " + ci.basecolorligth

				for(let day of week_days){
					let daydom = document.createElement("div")
					daydom.style.flex = "1"
					daydom.style.color = ci.basecolorbold
					daydom.classList.add('day-content')
					daydom.innerHTML = window.innerWidth < 800 ? day[1] : day[0]
					calendar_week.appendChild(daydom)
				}
			},
			drawDays: () => {
				const calendar_content = calendar.els.content
				calendar_content.innerHTML = ""

				const calendarDaysBase = calendar.getCalendarDays(calendar.currentDate.year, calendar.currentDate.month)
				const calendarDays = core.splitArray(calendarDaysBase, 7)

				const rect = calendar_app.getBoundingClientRect()
				const style = window.getComputedStyle(calendar_app)
				const calendar_width = rect.width - parseFloat(style.paddingLeft) - parseFloat(style.paddingRight)- parseFloat(style.borderLeftWidth)- parseFloat(style.borderRightWidth)


				for(let week of calendarDays){
					const weekdom = document.createElement("div")
					weekdom.classList.add("week-days--content")
					for(let date of week){
						
						const daydom = document.createElement("div")
						daydom.classList.add("week-day")
						daydom.style.flex = "1"
						daydom.style.height = (calendar_width/7) + "px"
						daydom.style.width = (calendar_width/7) + "px"

						if(date.month !== calendar.currentDate.month){
							daydom.style.color = ci.basecolorligth
						}else if(date.month === calendar.currentDate.month){
							daydom.style.color = ci.basecolor
						}

						if(date.date_str == calendar.today){
							daydom.classList.add("today")
							daydom.style.backgroundColor = ci.primary
							daydom.style.color = ci.primarycolor
						}

						daydom.innerHTML = `
							${date.day}
						`
						weekdom.appendChild(daydom)
					}
					calendar_content.appendChild(weekdom)
				}

				console.log(calendarDays)
			}
		}


		app.load()
		window.addEventListener('resize', () => {
			Gui.drawCalendar()
		});


		// Variables para guardar las coordenadas iniciales y finales
		let touchStartX = 0;
		let touchStartY = 0;
		let touchEndX = 0;
		let touchEndY = 0;

		// Selecciona el contenedor principal de tu calendario
		const calendarElement = document.querySelector('.calendar--content-area');

		const handleGesture = () => {
		    const swipeThreshold = 50; // Distancia mínima en píxeles para considerarlo un "swipe"
		    
		    // Calculamos la distancia recorrida en ambos ejes
		    const diffX = touchStartX - touchEndX;
		    const diffY = touchStartY - touchEndY;

		    // Condición clave: ¿El movimiento fue más horizontal que vertical?
		    // Esto evita que el mes cambie si el usuario solo está haciendo scroll hacia abajo
		    if (Math.abs(diffX) > Math.abs(diffY)) {
		        
		        // Verificamos si la distancia superó el umbral mínimo
		        if (diffX > swipeThreshold) {
		            // Deslizamiento hacia la izquierda <- (Avanzar el tiempo)
		            Gui.nextMonth()
		            
		        } else if (diffX < -swipeThreshold) {
		            // Deslizamiento hacia la derecha -> (Retroceder el tiempo)
		            Gui.previousMonth()
		        }
		    }
		};

		// Escuchamos cuando el dedo toca la pantalla
		calendarElement.addEventListener('touchstart', (e) => {
		    touchStartX = e.changedTouches[0].screenX;
		    touchStartY = e.changedTouches[0].screenY;
		}, { passive: true });

		// Escuchamos cuando el dedo deja la pantalla
		calendarElement.addEventListener('touchend', (e) => {
		    touchEndX = e.changedTouches[0].screenX;
		    touchEndY = e.changedTouches[0].screenY;
		    handleGesture();
		}, { passive: true });

		console.log(calendar)

	</script>
</body>
</html>
